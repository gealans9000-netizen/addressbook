<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<title>시공 현장 주소록</title>
<style>
  *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", sans-serif;
    background: #f1f5f9; color: #0f172a;
    min-height: 100vh; -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: contain;
  }

  .header {
    position: sticky; top: 0; z-index: 50;
    background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
    color: #fff;
    padding: max(12px, env(safe-area-inset-top)) 16px 12px;
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .brand {
    display: flex; align-items: center; gap: 8px;
    font-size: 17px; font-weight: 700;
  }
  .brand-icon {
    width: 28px; height: 28px; border-radius: 8px;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }
  .refresh-btn {
    background: rgba(255,255,255,0.1); border: none; color: #fff;
    width: 36px; height: 36px; border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .refresh-btn:active { background: rgba(255,255,255,0.2); }
  .refresh-btn.loading svg { animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .search-wrap { position: relative; }
  .search-wrap input {
    width: 100%; height: 44px; padding: 0 44px;
    border: none; border-radius: 12px;
    background: rgba(255,255,255,0.12); color: #fff;
    font-size: 16px; outline: none;
  }
  .search-wrap input:focus { background: rgba(255,255,255,0.18); }
  .search-wrap input::placeholder { color: rgba(255,255,255,0.5); }
  .search-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: rgba(255,255,255,0.6); pointer-events: none;
  }
  .clear-btn {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.2); border: none; color: #fff;
    width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
    display: none; align-items: center; justify-content: center; padding: 0;
  }
  .clear-btn.visible { display: flex; }

  .chips {
    display: flex; gap: 6px; overflow-x: auto;
    margin-top: 10px; padding-bottom: 2px;
    scrollbar-width: none;
  }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto;
    padding: 6px 12px; border-radius: 20px;
    background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.85);
    font-size: 12.5px; font-weight: 500;
    border: none; cursor: pointer; white-space: nowrap;
    transition: all 0.15s;
  }
  .chip.active { background: #fff; color: #0f172a; }

  .sort-bar { display: flex; gap: 6px; margin-top: 8px; }
  .sort-btn {
    padding: 5px 10px; border-radius: 8px;
    background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7);
    font-size: 12px; font-weight: 500; border: none; cursor: pointer;
    display: flex; align-items: center; gap: 4px;
  }
  .sort-btn.active { background: rgba(255,255,255,0.18); color: #fff; }

  .status-bar {
    padding: 10px 16px; font-size: 12.5px; color: #64748b;
  }
  .status-bar .count { font-weight: 600; color: #0f172a; }
  .status-bar.error { color: #dc2626; }

  .list {
    padding: 0 12px;
    padding-bottom: calc(60px + env(safe-area-inset-bottom));
  }

  .date-group {
    padding: 12px 4px 6px; font-size: 12px; font-weight: 600;
    color: #64748b; letter-spacing: 0.3px;
  }
  .date-group:first-child { padding-top: 4px; }

  .card {
    background: #fff; border-radius: 16px; padding: 14px 16px;
    margin-bottom: 8px; border: 1px solid #e2e8f0;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  }
  .card-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 10px; margin-bottom: 8px;
  }
  .site-name {
    flex: 1; min-width: 0;
    font-size: 17px; font-weight: 700; color: #0f172a;
    line-height: 1.3; word-break: break-word;
  }
  .site-date {
    flex: 0 0 auto; font-size: 12px; font-weight: 600;
    color: #475569; background: #f1f5f9;
    padding: 4px 9px; border-radius: 6px; white-space: nowrap;
  }
  .company-line {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 10px; padding-bottom: 10px;
    border-bottom: 1px solid #f1f5f9;
  }
  .company-icon {
    width: 22px; height: 22px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #fff; flex: 0 0 auto;
  }
  .company-name { font-size: 14px; font-weight: 600; color: #334155; }

  .address-block { display: flex; gap: 10px; align-items: flex-start; }
  .address-pin {
    flex: 0 0 28px; height: 28px; border-radius: 8px;
    background: #ecfdf5; color: #059669;
    display: flex; align-items: center; justify-content: center;
  }
  .address-content { flex: 1; min-width: 0; padding-top: 3px; }
  .address-label {
    font-size: 11px; color: #94a3b8; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 2px;
  }
  .address-link {
    display: flex; align-items: center; gap: 6px;
    color: #059669; font-weight: 500; font-size: 14px;
    text-decoration: none; line-height: 1.45; word-break: keep-all;
  }
  .address-link .arrow { font-size: 13px; color: #94a3b8; flex: 0 0 auto; }
  .address-link:active { opacity: 0.6; }

  .extra-info {
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid #f1f5f9;
    display: flex; flex-wrap: wrap; gap: 10px;
    font-size: 13px; color: #475569;
  }
  .extra-info a { color: #2563eb; text-decoration: none; font-weight: 500; }
  .extra-info .item { display: flex; align-items: center; gap: 4px; }

  .empty { text-align: center; padding: 80px 20px 40px; color: #94a3b8; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
  .empty-title { font-size: 16px; font-weight: 600; color: #475569; margin-bottom: 4px; }
  .empty-text { font-size: 13px; }

  .footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-top: 1px solid #e2e8f0;
    padding: 8px 16px calc(8px + env(safe-area-inset-bottom));
    font-size: 11px; color: #94a3b8; text-align: center;
  }

  mark { background: #fef08a; color: #713f12; padding: 0 2px; border-radius: 3px; }

  .skeleton-card {
    background: #fff; border-radius: 16px; padding: 14px 16px;
    margin-bottom: 8px; border: 1px solid #e2e8f0;
  }
  .skeleton-line {
    background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
    background-size: 200% 100%; animation: shimmer 1.2s infinite;
    border-radius: 4px; height: 14px;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  @media (min-width: 600px) {
    .header, .list, .status-bar, .footer { max-width: 520px; margin-left: auto; margin-right: auto; }
    .footer { left: 50%; transform: translateX(-50%); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="brand">
      <div class="brand-icon">🏗️</div>
      <span>시공 현장 주소록</span>
    </div>
    <button class="refresh-btn" id="refresh" aria-label="새로고침">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/>
      </svg>
    </button>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>
    </svg>
    <input type="search" id="search" placeholder="현장명·업체명·주소·날짜 검색" autocomplete="off">
    <button class="clear-btn" id="clear" aria-label="지우기">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>
  <div class="chips" id="chips"></div>
  <div class="sort-bar">
    <button class="sort-btn active" data-sort="date-desc">📅 최신순</button>
    <button class="sort-btn" data-sort="date-asc">📅 오래된순</button>
    <button class="sort-btn" data-sort="company">🏢 업체별</button>
  </div>
</div>

<div class="status-bar" id="status"><span>데이터를 불러오는 중...</span></div>

<div class="list" id="list">
  <div class="skeleton-card">
    <div class="skeleton-line" style="width: 60%; height: 18px; margin-bottom: 12px;"></div>
    <div class="skeleton-line" style="width: 40%; margin-bottom: 10px;"></div>
    <div class="skeleton-line" style="width: 85%;"></div>
  </div>
  <div class="skeleton-card">
    <div class="skeleton-line" style="width: 50%; height: 18px; margin-bottom: 12px;"></div>
    <div class="skeleton-line" style="width: 35%; margin-bottom: 10px;"></div>
    <div class="skeleton-line" style="width: 75%;"></div>
  </div>
</div>

<div class="footer" id="footer">실시간 동기화 · 시트 수정 즉시 반영</div>

<script>
  // ⚠️ Apps Script 웹 앱 URL을 여기에 입력
  const API_URL = "https://script.google.com/macros/s/AKfycbyLimN9GksVuqjAA2dtnPBlWeH4j1Fu8yRMTJo68VrTyfaaZ5uJzVF7AsNylKGOTYmTEg/exec";

  let headers = [];
  let rows = [];
  let categories = [];
  let activeCategory = "전체";
  let searchQuery = "";
  let sortMode = "date-desc";
  let COL = {};

  const COMPANY_COLORS = [
    "#3b82f6", "#10b981", "#f59e0b", "#ef4444",
    "#8b5cf6", "#ec4899", "#06b6d4", "#84cc16",
    "#f97316", "#6366f1", "#14b8a6", "#a855f7"
  ];

  function findCol(patterns) {
    for (const p of patterns) {
      const idx = headers.findIndex(h => p.test(h));
      if (idx !== -1) return idx;
    }
    return -1;
  }

  function escapeHTML(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    })[c]);
  }

  function highlight(text, q) {
    if (!q) return escapeHTML(text);
    const safe = escapeHTML(text);
    const safeQ = q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    return safe.replace(new RegExp(safeQ, "gi"), m => `<mark>${m}</mark>`);
  }

  function getInitial(name) {
    return (name || "?").trim().charAt(0).toUpperCase();
  }
  function getCompanyColor(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    return COMPANY_COLORS[Math.abs(hash) % COMPANY_COLORS.length];
  }

  function parseDate(s) {
    if (!s) return null;
    const m = s.match(/(\d{4})[.\-\/년\s]+(\d{1,2})[.\-\/월\s]+(\d{1,2})/);
    if (!m) return null;
    return new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
  }
  function formatDateShort(s) {
    const d = parseDate(s);
    if (!d) return s || "";
    const yy = String(d.getFullYear()).slice(2);
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    const days = ["일","월","화","수","목","금","토"];
    return `${yy}.${mm}.${dd} (${days[d.getDay()]})`;
  }
  function formatGroupHeader(s) {
    const d = parseDate(s);
    if (!d) return "날짜 미상";
    return `${d.getFullYear()}년 ${d.getMonth() + 1}월`;
  }

  function openNaverNavi(addr) {
    if (!addr) return;
    const encoded = encodeURIComponent(addr);
    const appUrl = `nmap://search?query=${encoded}&appname=addressbook`;
    const webUrl = `https://map.naver.com/p/search/${encoded}`;
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    if (isMobile) {
      window.location.href = appUrl;
      setTimeout(() => {
        if (!document.hidden) window.location.href = webUrl;
      }, 1500);
    } else {
      window.open(webUrl, "_blank", "noopener");
    }
  }
  window.openNaverNavi = openNaverNavi;

  function telLink(n) { return "tel:" + n.replace(/[^\d+]/g, ""); }

  function renderChips() {
    const chips = document.getElementById("chips");
    if (categories.length <= 1) {
      chips.innerHTML = "";
      chips.style.display = "none";
      return;
    }
    chips.style.display = "flex";
    const items = ["전체", ...categories];
    chips.innerHTML = items.map(cat => `
      <button class="chip ${cat === activeCategory ? "active" : ""}" data-cat="${escapeHTML(cat)}">
        ${escapeHTML(cat)}
      </button>
    `).join("");
    chips.querySelectorAll(".chip").forEach(btn => {
      btn.addEventListener("click", () => {
        activeCategory = btn.dataset.cat;
        renderChips();
        render();
      });
    });
  }

  function render() {
    const list = document.getElementById("list");
    const status = document.getElementById("status");
    const q = searchQuery.toLowerCase();

    let filtered = rows.slice();
    if (activeCategory !== "전체" && COL.cat !== -1) {
      filtered = filtered.filter(r => String(r.data[COL.cat] || "").trim() === activeCategory);
    }
    if (q) {
      filtered = filtered.filter(r => r.data.some(c => String(c || "").toLowerCase().includes(q)));
    }

    if (sortMode === "date-desc" || sortMode === "date-asc") {
      const dir = sortMode === "date-desc" ? -1 : 1;
      filtered.sort((a, b) => {
        const da = COL.date !== -1 ? parseDate(a.data[COL.date]) : null;
        const db = COL.date !== -1 ? parseDate(b.data[COL.date]) : null;
        if (!da && !db) return 0;
        if (!da) return 1;
        if (!db) return -1;
        return (da - db) * dir;
      });
    } else if (sortMode === "company" && COL.company !== -1) {
      filtered.sort((a, b) => {
        const ca = String(a.data[COL.company] || "").trim();
        const cb = String(b.data[COL.company] || "").trim();
        return ca.localeCompare(cb, "ko");
      });
    }

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty">
          <div class="empty-icon">🔎</div>
          <div class="empty-title">${q ? "검색 결과가 없습니다" : "데이터가 없습니다"}</div>
          <div class="empty-text">${q ? "다른 검색어를 시도해보세요" : ""}</div>
        </div>`;
      status.querySelector("span").innerHTML = `<span class="count">0건</span> / 총 ${rows.length}건`;
      return;
    }

    const useGrouping = (sortMode === "date-desc" || sortMode === "date-asc") && !q && activeCategory === "전체" && COL.date !== -1;
    let lastGroup = null;
    const html = [];

    filtered.forEach(rowObj => {
      const row = rowObj.data;
      const date = COL.date !== -1 ? String(row[COL.date] || "").trim() : "";
      const company = COL.company !== -1 ? String(row[COL.company] || "").trim() : "";
      const site = COL.site !== -1 ? String(row[COL.site] || "").trim() : "";
      const address = COL.address !== -1 ? String(row[COL.address] || "").trim() : "";
      const person = COL.person !== -1 ? String(row[COL.person] || "").trim() : "";
      const phone = COL.phone !== -1 ? String(row[COL.phone] || "").trim() : "";

      if (useGrouping) {
        const group = formatGroupHeader(date);
        if (group !== lastGroup) {
          html.push(`<div class="date-group">${group}</div>`);
          lastGroup = group;
        }
      }

      const titleText = site || company || "(이름 없음)";
      const safeAddr = address.replace(/'/g, "\\'").replace(/"/g, '&quot;');
      const companyColor = getCompanyColor(company);

      const extras = [];
      if (person) extras.push(`<div class="item">👤 ${highlight(person, q)}</div>`);
      if (phone) extras.push(`<div class="item">📞 <a href="${telLink(phone)}">${highlight(phone, q)}</a></div>`);

      html.push(`
        <div class="card">
          <div class="card-top">
            <div class="site-name">${highlight(titleText, q)}</div>
            ${date ? `<div class="site-date">${highlight(formatDateShort(date), q)}</div>` : ""}
          </div>
          ${company ? `
            <div class="company-line">
              <div class="company-icon" style="background:${companyColor}">${escapeHTML(getInitial(company))}</div>
              <div class="company-name">${highlight(company, q)}</div>
            </div>
          ` : ""}
          ${address ? `
            <div class="address-block">
              <div class="address-pin">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>
                </svg>
              </div>
              <div class="address-content">
                <div class="address-label">탭하여 네이버 내비</div>
                <a href="javascript:void(0)" onclick="openNaverNavi('${safeAddr}')" class="address-link">
                  <span>${highlight(address, q)}</span>
                  <span class="arrow">→</span>
                </a>
              </div>
            </div>
          ` : ""}
          ${extras.length ? `<div class="extra-info">${extras.join("")}</div>` : ""}
        </div>
      `);
    });

    list.innerHTML = html.join("");
    const countTxt = (q || activeCategory !== "전체")
      ? `<span class="count">${filtered.length}건</span> / 총 ${rows.length}건`
      : `<span class="count">총 ${rows.length}건</span>`;
    status.querySelector("span").innerHTML = countTxt;
  }

  async function loadData() {
    const status = document.getElementById("status");
    const refreshBtn = document.getElementById("refresh");
    const footer = document.getElementById("footer");

    status.classList.remove("error");
    status.querySelector("span").textContent = "데이터를 불러오는 중...";
    refreshBtn.classList.add("loading");

    try {
      const res = await fetch(API_URL + "?action=list&_t=" + Date.now());
      if (!res.ok) throw new Error("HTTP " + res.status);
      const result = await res.json();
      if (!result.ok) throw new Error(result.error || "불러오기 실패");

      headers = (result.headers || []).map(h => String(h).trim());
      rows = result.rows || [];

      COL = {
        date:    findCol([/시공\s*일|날짜|일자|date/i]),
        cat:     findCol([/업체\s*구분|구분|카테고리|분류/i]),
        company: findCol([/업체\s*명|회사\s*명|상호|^업체$|^회사$/i]),
        site:    findCol([/현장\s*명|현장|sitename|site/i]),
        address: findCol([/주\s*소|소재지|위치|address|location/i]),
        person:  findCol([/담당자|담당|성명/i]),
        phone:   findCol([/전화|연락처|핸드폰|휴대폰|폰|tel|phone|mobile/i])
      };

      // 업체 구분 종류 추출
      if (COL.cat !== -1) {
        const set = new Set();
        rows.forEach(r => {
          const c = String(r.data[COL.cat] || "").trim();
          if (c) set.add(c);
        });
        categories = [...set].sort();
      } else {
        categories = [];
      }

      renderChips();
      render();

      const now = new Date();
      const hh = String(now.getHours()).padStart(2, "0");
      const mm = String(now.getMinutes()).padStart(2, "0");
      footer.textContent = `마지막 동기화 ${hh}:${mm} · 실시간 반영`;
    } catch (err) {
      status.classList.add("error");
      status.querySelector("span").textContent = "불러오기 실패: " + err.message;
      document.getElementById("list").innerHTML = `
        <div class="empty">
          <div class="empty-icon">⚠️</div>
          <div class="empty-title">데이터를 불러올 수 없습니다</div>
          <div class="empty-text">${escapeHTML(err.message)}</div>
        </div>`;
    } finally {
      refreshBtn.classList.remove("loading");
    }
  }

  const searchInput = document.getElementById("search");
  const clearBtn = document.getElementById("clear");
  let searchTimer;
  searchInput.addEventListener("input", e => {
    const v = e.target.value;
    clearBtn.classList.toggle("visible", v.length > 0);
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { searchQuery = v.trim(); render(); }, 150);
  });
  clearBtn.addEventListener("click", () => {
    searchInput.value = ""; searchQuery = "";
    clearBtn.classList.remove("visible"); render(); searchInput.focus();
  });
  document.getElementById("refresh").addEventListener("click", loadData);

  document.querySelectorAll(".sort-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      sortMode = btn.dataset.sort;
      render();
    });
  });

  let lastLoad = Date.now();
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden && Date.now() - lastLoad > 60 * 1000) {
      lastLoad = Date.now();
      loadData();
    }
  });

  loadData();
  lastLoad = Date.now();
</script>
</body>
</html>
